<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CORTIS × ELLEN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--surface:#181818;--border:#2a2a2a;--cream:#e8e0d4;--muted:#555}
body{background:var(--bg);min-height:100dvh;font-family:'Space Mono',monospace;color:var(--cream);padding:1rem 1rem 2rem}

.hdr{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:.6rem;margin-bottom:1.2rem}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em}
.hdr span{font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}

.strip-wrap{display:flex;justify-content:center;margin-bottom:1.2rem}
#mainCanvas{display:block;border-radius:3px}

.lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.slot-row{display:flex;gap:6px;margin-bottom:.9rem}
.slot-btn{flex:1;padding:11px 4px;border-radius:3px;border:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--cream);cursor:pointer;font-family:'Space Mono',monospace;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.slot-btn.active{border-color:var(--cream);background:#1f1f1f}
.slot-btn.filled{border-color:#555;color:#888}
.slot-btn.filled::after{content:" ✓"}

.btn{width:100%;padding:14px 10px;border-radius:3px;border:1px solid var(--border);background:var(--surface);color:var(--cream);font-size:11px;letter-spacing:.14em;cursor:pointer;font-family:'Space Mono',monospace;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px;-webkit-tap-highlight-color:transparent;transition:all .15s}
.btn:active{opacity:.6;transform:scale(.98)}
.btn.primary{background:var(--cream);color:var(--bg);border-color:var(--cream);font-weight:700}
.btn.danger{border-color:#c0392b;color:#e74c3c;background:transparent}
.btn:disabled{opacity:.2;cursor:not-allowed}

/* ── Camera modal ── */
.modal{
  display:none;
  position:fixed;inset:0;
  background:#000;
  z-index:400;
  flex-direction:column;
}
.modal.open{display:flex}

/* Video fills available height above controls */
.vf-area{
  flex:1;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:#000;
}

/* Video sized to match slot aspect ratio, centered */
#camVideo{
  display:block;
  max-width:100%;
  max-height:100%;
  object-fit:cover;
}

/* Frame crop overlay — shows only the current slot portion of the frame */
#vfFrameCanvas{
  position:absolute;
  pointer-events:none;
}

/* Bottom controls — always visible, never hidden */
.vf-controls{
  flex:0 0 auto;
  background:#0a0a0a;
  border-top:1px solid var(--border);
  padding:.75rem 1rem;
  display:flex;
  flex-direction:column;
  gap:.5rem;
}
.vf-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.vf-slot-lbl{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.1em;color:var(--cream)}
.vf-hint{font-size:9px;color:var(--muted);letter-spacing:.08em}
.vf-btns{display:flex;gap:8px}
.vf-btns .btn{margin-bottom:0;flex:1;padding:13px 10px}
</style>
</head>
<body>

<div class="hdr">
  <h1>CORTIS × ELLEN</h1>
  <span>Birthday Strip</span>
</div>

<div class="strip-wrap">
  <canvas id="mainCanvas" width="200" height="595"></canvas>
</div>

<span class="lbl">選格子 Slot</span>
<div class="slot-row" id="slotSel"></div>

<button class="btn primary" id="shootBtn">
  <i class="ti ti-camera"></i> SHOOT — 拍照
</button>
<input type="file" id="camInput" accept="image/*" capture="user" style="display:none">

<button class="btn primary" id="dlBtn" disabled>
  <i class="ti ti-download"></i> SAVE STRIP
</button>
<button class="btn danger" id="clearBtn">
  <i class="ti ti-trash"></i> CLEAR ALL
</button>

<!-- Camera modal -->
<div class="modal" id="camModal">
  <div class="vf-area" id="vfArea">
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="vfFrameCanvas"></canvas>
  </div>
  <div class="vf-controls">
    <div class="vf-meta">
      <span class="vf-slot-lbl" id="vfSlotLbl">SLOT 1 / 4</span>
      <span class="vf-hint">對準框線後按 SNAP</span>
    </div>
    <div class="vf-btns">
      <button class="btn primary" id="snapBtn"><i class="ti ti-aperture"></i> SNAP</button>
      <button class="btn" id="closeCamBtn">CANCEL</button>
    </div>
  </div>
  <canvas id="snapCanvas" style="display:none"></canvas>
</div>

const photos = Array(4).fill(null);
let activeSlot = 0;
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// Preload full frame image (used in strip + vf overlay)
const frameImg = new Image();
frameImg.onload = drawStrip;
frameImg.src = FRAME_DATA;

// ── Draw main strip ──
function drawStrip() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  for (let i = 0; i < 4; i++) {
    const s = SLOTS[i];
    if (photos[i]) {
      ctx.save();
      ctx.beginPath(); ctx.rect(s.x, s.y, s.w, s.h); ctx.clip();
      const img = photos[i];
      const sc = Math.max(s.w / img.width, s.h / img.height);
      ctx.drawImage(img,
        s.x + (s.w - img.width * sc) / 2,
        s.y + (s.h - img.height * sc) / 2,
        img.width * sc, img.height * sc);
      ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fillRect(s.x, s.y, s.w, s.h);
      ctx.font = '8px "Space Mono",monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.textAlign = 'center';
      ctx.fillText('SLOT ' + (i + 1), s.x + s.w / 2, s.y + s.h / 2 + 3);
    }
  }
  if (frameImg.complete && frameImg.naturalWidth) {
    ctx.drawImage(frameImg, 0, 0, CANVAS_W, CANVAS_H);
  }
}

// ── Slot buttons ──
const slotSel = document.getElementById('slotSel');
for (let i = 0; i < 4; i++) {
  const b = document.createElement('button');
  b.className = 'slot-btn' + (i === 0 ? ' active' : '');
  b.textContent = i + 1;
  b.addEventListener('click', () => {
    slotSel.querySelectorAll('.slot-btn').forEach((x, j) => x.classList.toggle('active', j === i));
    activeSlot = i;
  });
  slotSel.appendChild(b);
}

// ── Viewfinder frame overlay (single slot crop) ──
function drawVfOverlay() {
  if (!frameImg.complete || !frameImg.naturalWidth) return;
  const s = SLOTS[activeSlot];
  const video = document.getElementById('camVideo');
  const area = document.getElementById('vfArea');
  const fc = document.getElementById('vfFrameCanvas');

  // The video element's rendered size
  const vRect = video.getBoundingClientRect();
  const vW = vRect.width || video.offsetWidth;
  const vH = vRect.height || video.offsetHeight;
  if (!vW || !vH) return;

  fc.width = vW;
  fc.height = vH;
  fc.style.width = vW + 'px';
  fc.style.height = vH + 'px';
  // Position canvas exactly over the video
  fc.style.left = (video.offsetLeft) + 'px';
  fc.style.top  = (video.offsetTop) + 'px';

  const fctx = fc.getContext('2d');
  fctx.clearRect(0, 0, vW, vH);

  // Scale factors: map slot coords → video display coords
  // The video displays exactly the slot's content (same aspect ratio)
  // so the full video area maps to slot (s.x, s.y, s.w, s.h) in strip space
  const scaleX = vW / s.w;
  const scaleY = vH / s.h;

  // Draw the frame image, shifted & scaled so only the slot region shows
  // sourceX in frameImg = s.x * (frameImg.naturalWidth / CANVAS_W)
  const imgScaleX = frameImg.naturalWidth / CANVAS_W;
  const imgScaleY = frameImg.naturalHeight / CANVAS_H;

  const srcX = s.x * imgScaleX;
  const srcY = s.y * imgScaleY;
  const srcW = s.w * imgScaleX;
  const srcH = s.h * imgScaleY;

  // Draw the cropped slot portion of the frame, stretched to fill vW x vH
  fctx.globalAlpha = 0.88;
  fctx.drawImage(frameImg, srcX, srcY, srcW, srcH, 0, 0, vW, vH);
  fctx.globalAlpha = 1;

  // Bright slot border
  fctx.strokeStyle = 'rgba(232,224,212,0.7)';
  fctx.lineWidth = 2;
  fctx.strokeRect(1, 1, vW - 2, vH - 2);
}

// ── Open camera ──
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

document.getElementById('shootBtn').addEventListener('click', async () => {
  if (isMobile) { document.getElementById('camInput').click(); return; }
  try {
    const s = SLOTS[activeSlot];
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', aspectRatio: { ideal: s.w / s.h } }
    });
    const vid = document.getElementById('camVideo');
    vid.srcObject = stream;
    // Lock video element to slot aspect ratio
    vid.style.aspectRatio = s.w + '/' + s.h;
    vid.style.maxHeight = '70dvh';
    window._cs = stream;
    document.getElementById('vfSlotLbl').textContent = 'SLOT ' + (activeSlot + 1) + ' / 4';
    document.getElementById('camModal').classList.add('open');
    await vid.play();
    setTimeout(drawVfOverlay, 150);
  } catch (e) {
    document.getElementById('camInput').click();
  }
});

// ── Snap ──
document.getElementById('snapBtn').addEventListener('click', () => {
  const v = document.getElementById('camVideo');
  const sc = document.getElementById('snapCanvas');
  sc.width = v.videoWidth;
  sc.height = v.videoHeight;
  sc.getContext('2d').drawImage(v, 0, 0);
  sc.toBlob(blob => {
    const img = new Image(), url = URL.createObjectURL(blob);
    img.onload = () => { photos[activeSlot] = img; afterLoad(); URL.revokeObjectURL(url); };
    img.src = url;
    closeCamera();
  }, 'image/jpeg', 0.93);
});

// Mobile file input
document.getElementById('camInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});

document.getElementById('closeCamBtn').addEventListener('click', closeCamera);
function closeCamera() {
  document.getElementById('camModal').classList.remove('open');
  if (window._cs) { window._cs.getTracks().forEach(t => t.stop()); window._cs = null; }
}

function loadFile(file) {
  const r = new FileReader();
  r.onload = e => { const img = new Image(); img.onload = () => { photos[activeSlot] = img; afterLoad(); }; img.src = e.target.result; };
  r.readAsDataURL(file);
}

function afterLoad() {
  drawStrip();
  document.getElementById('dlBtn').disabled = false;
  slotSel.querySelectorAll('.slot-btn')[activeSlot].classList.add('filled');
  if (activeSlot < 3) {
    activeSlot++;
    slotSel.querySelectorAll('.slot-btn').forEach((b, i) => b.classList.toggle('active', i === activeSlot));
  }
}

document.getElementById('dlBtn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'cortis-ellen-strip.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  photos.fill(null); drawStrip();
  document.getElementById('dlBtn').disabled = true;
  slotSel.querySelectorAll('.slot-btn').forEach((b, i) => {
    b.classList.remove('filled'); b.classList.toggle('active', i === 0);
  });
  activeSlot = 0;
});
</script>
</body>
</html>
